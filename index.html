<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding-Loop</title>
    
    <style>
/* BACKGROUND */

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #0F0F0F;
        font-family: 'Courier New', Courier, monospace;
        color: #93a1a1;
        min-height: 100vh;
    }

/* CONTAINER DO TEXTO (barra para topo e base) */

    .bg-bar {
        position: fixed;
        left: 0;
        width: 100vw;
        z-index: -2;
        overflow: hidden;
        padding: 10px 15px;
        display: flex;
        flex-wrap: nowrap;
        gap: 18px;
        background-color: rgba(15, 15, 15, 0.9);
    }

/* Posiciona estritamente no topo */

    .bg-bar-top {
        top: 0;
        border-bottom: 1px solid rgba(42, 161, 152, 0.2);
    }

/* Posiciona estritamente na base */

    .bg-bar-bottom {
        bottom: 0;
        border-top: 1px solid rgba(42, 161, 152, 0.2);
    }

    .code-block {
        display: inline-block;
        white-space: nowrap;
        font-size: 13px;
        will-change: opacity;
        animation: piscarBloco 3s infinite ease-in-out;
    }

/* Variações de animação para dar ritmo */

    .code-block:nth-child(2n) { animation-duration: 2.2s; animation-delay: 0.3s; }
    .code-block:nth-child(3n) { animation-duration: 3.1s; animation-delay: 0.7s; }

    @keyframes piscarBloco {
        0%, 100% { opacity: 0.1; color: #93a1a1; }
        50% { opacity: 0.8; color: #2aa198; }
    }

/* CSS PARA O EFEITO ALEATÓRIO (Coding Loop) */

    .aleatorio-code-block {
        position: absolute;
        display: inline-block;
        white-space: nowrap;
        font-size: 14px;
        opacity: 0.3;
        pointer-events: none;
        z-index: -1;
    }

    .aleatorio-code-block span.letra {
        display: inline-block;
        animation: piscarAleatorio 2s infinite both;
        animation-delay: calc(var(--i) * 0.08s);
    }

    @keyframes piscarAleatorio {
        0%, 100% { opacity: 0.05; }
        50% { opacity: 1; color: #2aa198; }
    }

/* HOME PAGE*/

    h1{
        background-color: #0F0F0F;
        text-align: center;
        position: absolute;
        top: 3px;
        left: 25px;
        z-index: 10;
        color: #93a1a1;
    }
    </style>
</head>  
<body>

  <!-- BACKGROUND BARRAS FIXAS (topo e base) -->
  <div class="bg-bar bg-bar-top" id="containerTop"></div>
  <div class="bg-bar bg-bar-bottom" id="containerBottom"></div>

  <!-- BACKGROUND ALEATÓRIO (tela inteira) -->
  <div id="bgContainer"></div>
    
  <script>
    // === EFEITO 1: BARRAS FIXAS (topo e base) ===
    function criarBlocoCodigo() {
      return `
        <div class="code-block">
          &nbsp;...01111011&nbsp;...&nbsp;Coding&nbsp;Loop&nbsp;...&nbsp;101110110&nbsp;
        </div>
      `;
    }

    function renderizarBarras() {
      const topContainer = document.getElementById('containerTop');
      const bottomContainer = document.getElementById('containerBottom');
      
      let htmlTop = '';
      let htmlBottom = '';
      
      for (let i = 0; i < 20; i++) {
        htmlTop += criarBlocoCodigo();
        htmlBottom += criarBlocoCodigo();
      }
      
      topContainer.innerHTML = htmlTop;
      bottomContainer.innerHTML = htmlBottom;
    }

    renderizarBarras();

    // === EFEITO 2: BLOCO ALEATÓRIO (Coding Loop) ===
    const container = document.getElementById('bgContainer');

    function obterHTMLCodigo() {
      return `
        &nbsp;
        <span class='letra' style='--i:1'>.</span>
        <span class='letra' style='--i:2'>.</span>
        <span class='letra' style='--i:3'>.</span>
        <span class='letra' style='--i:1'>0</span>
        <span class='letra' style='--i:2'>1</span>
        <span class='letra' style='--i:3'>1</span>
        <span class='letra' style='--i:4'>1</span>
        <span class='letra' style='--i:5'>1</span>
        <span class='letra' style='--i:6'>0</span>
        <span class='letra' style='--i:4'>1</span>
        <span class='letra' style='--i:5'>1</span>
        &nbsp;
        <span class='letra' style='--i:1'>.</span>
        <span class='letra' style='--i:2'>.</span>
        <span class='letra' style='--i:3'>.</span>
        &nbsp;
        <span class='letra' style='--i:1'>C</span>
        <span class='letra' style='--i:2'>o</span>
        <span class='letra' style='--i:3'>d</span>
        <span class='letra' style='--i:4'>i</span>
        <span class='letra' style='--i:5'>n</span>
        <span class='letra' style='--i:6'>g</span>
        &nbsp;
        <span class='letra' style='--i:7'>L</span>
        <span class='letra' style='--i:8'>o</span>
        <span class='letra' style='--i:9'>o</span>
        <span class='letra' style='--i:10'>p</span>
        &nbsp;
        <span class='letra' style='--i:4'>.</span>
        <span class='letra' style='--i:5'>.</span>
        <span class='letra' style='--i:6'>.</span>
        &nbsp;
        <span class='letra' style='--i:1'>1</span>
        <span class='letra' style='--i:2'>0</span>
        <span class='letra' style='--i:3'>1</span>
        <span class='letra' style='--i:4'>1</span>
        <span class='letra' style='--i:5'>1</span>
        <span class='letra' style='--i:6'>0</span>
        <span class='letra' style='--i:4'>1</span>
        <span class='letra' style='--i:5'>1</span>
        <span class='letra' style='--i:6'>0</span>
        &nbsp;
      `;
    }

    function spawnNovoBloco() {
      container.innerHTML = '';

      const novoBloco = document.createElement('div');
      novoBloco.className = 'aleatorio-code-block';
      novoBloco.innerHTML = obterHTMLCodigo();

      container.appendChild(novoBloco);
      
      const blocoWidth = novoBloco.offsetWidth;
      const larguraDaTela = window.innerWidth;
      const maxPercentLeft = ((larguraDaTela - blocoWidth) / larguraDaTela) * 100;
      
      const randomTop = Math.random() * 100;
      const randomLeft = Math.random() * maxPercentLeft;

      novoBloco.style.top = randomTop + 'vh';
      novoBloco.style.left = randomLeft + 'vw';
    }

    spawnNovoBloco();
    setInterval(spawnNovoBloco, 2500);
  </script>
  
  <!-- HOME PAGE -->
  <h1>Coding-loop</h1>

</body>
</html>
