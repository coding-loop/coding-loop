<!DOCTYPE html>
<html lang="pt-br">  
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Coding Loop</title>
    <style>
        h5 {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2px;
        }

        h5 span.letra {
            display: inline-block;
            animation: piscar 1.9s infinite both;
            animation-delay: calc(var(--i) * 0.1s);
        }

        .slash-rotating {
            display: inline-block;
            animation: rodar 1.5s linear infinite;
            margin-left: 5px;
        }

        @keyframes piscar {
            0%, 100% { opacity: 0.2; }
            20% { opacity: 1; }
        }

        @keyframes rodar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>  
<body>
    <h5>
        <span class="slash-rotating">/</span>
        <span>&#160;</span>
        <span class="letra" style="--i:1">C</span>
        <span class="letra" style="--i:2">o</span>
        <span class="letra" style="--i:3">d</span>
        <span class="letra" style="--i:4">i</span>
        <span class="letra" style="--i:5">n</span>
        <span class="letra" style="--i:6">g</span>
        <span>&#160;</span>
        <span class="letra" style="--i:7">L</span>
        <span class="letra" style="--i:8">o</span>
        <span class="letra" style="--i:9">o</span>
        <span class="letra" style="--i:10">p</span>
    </h5>
    <h1>Coding Loop ...</h1>
</body>
</html>
