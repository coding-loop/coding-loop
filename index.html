<!DOCTYPE html>
<html lang='pt-BR'> 
<head>
  <meta charset='UTF-8'/>
  <meta content='width=device-width, initial-scale=1.0' name='viewport'/>
  <title>Coding-Loop</title>

 <style type='text/css'>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: #002b36;  
        color: #333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Barra de Navegação */
    header {
        background-color: #011524;
        padding: 15px 20px; 
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin: 10px;          
        border-radius: 8px;    
        color: #ffffff;
    }

    /* Alinhamento flexível para a logo e o texto */
    .site-logo a {
        display: flex;
        align-items: center; 
        text-decoration: none;
    }

    /* Estilo da Imagem */
    .site-logo .logo {
        width: 50px;
        height: auto;
        display: block;
    }

    /* Estilo do Texto */
    .site-logo .name {
        font-family: 'Courier New', Courier, monospace;
        font-size: 28px;
        font-weight: bold;
        color: #f4f4f9;
        margin-left: 10px; 
    }

    nav {
        display: flex;
        align-items: center;
    }

    nav a {
        text-decoration: none;
        color: #2aa198;
        margin-left: 20px;
        font-weight: 500;
        transition: color 0.3s;
    }

    nav a:hover {
        color: #ff5722;
    }

    .btn-login {
        color: #2aa198;
        padding: 8px 18px;
        border-radius: 20px;
        transition: all 0.3s;
    }

    .btn-login:hover {
        background-color: #ff5722;
        color: #fff !important;
    }

    /* Seção Principal (Home) */
    .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
    }

    .hero h1 {
        font-size: 48px;
        margin-bottom: 20px;
        color: #f4f4f9;
    }

    .hero p {
        font-size: 18px;
        color: #93a1a1;
        max-width: 600px;
        margin-bottom: 30px;
    }

    /* Botão de Teste do Editor */
    .container-teste {
        text-align: center;
        margin-bottom: 40px;
    }

    .btn-editor-teste {
        background-color: #2aa198;
        color: #011524;
        padding: 12px 24px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .btn-editor-teste:hover {
        background-color: #268bd2;
        color: #fff;
        transform: translateY(-2px);
    }

    /* Modal de Login / Cadastro */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 9999;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .login-card {
        background: #fff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        position: relative;
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 24px;
        cursor: pointer;
        color: #999;
    }

    .login-card h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        display: block;
        margin-bottom: 5px;
        color: #666;
        font-size: 14px;
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
    }

    .input-group input:focus {
        border-color: #ff5722;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #ff5722;
        color: white;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
    }

    .btn-submit:hover {
        background-color: #e64a19;
    }

    .switch-form {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
    }

    .switch-form a {
        color: #ff5722;
        text-decoration: none;
        font-weight: bold;
    }

    .switch-form a:hover {
        text-decoration: underline;
    }

    .hidden {
        display: none;
    }
  </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class='site-logo'>
            <a href='/' title='Ir para a página inicial do Coding Loop'>
                <img alt='Logo do Coding Loop: Editor de Código' class='logo' src='https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhAhvH9upKxyeGU0ifjKJTFWPz7sOI-5XYpE3rd8rlkCD-8G4iK9HXBK25iGT6lnbwQ_opazvBUUyxymxJmpRzfcVBEgR8OBx1mGyvkwllwP6OS9wYW-qw_J_U6KdHa_UYybRHMdVZz9rg6q_8i7LwBUne-QV4ENr4NQBhB-9sbMt5LHA/s1600/white.-logo.webp'/>
                <h1 class='name'>Coding-Loop</h1>
            </a>
        </div>
        <nav>
            <a href='#'>&lt; Início &gt;</a>
            <a href='#'>&lt; Sobre &gt;</a>
            <a class='btn-login' href='#' id='openLogin'> &lt; / Entrar &gt;</a>
        </nav>
    </header>

    <!-- Conteúdo Dinâmico da Home -->
    <main class='hero' id='homeContent'>
        <h1>Bem-vindo à sua nova plataforma</h1>
        <p>Crie postagens, compartilhe suas ideias e conecte-se com o mundo de forma simples e rápida.</p>
    </main>

    <!-- Botão de Teste para o Editor HTML -->
    <div class='container-teste'>
        <a class='btn-editor-teste' href='https://coding-boot.blogspot.com/p/dashboard.html' id='btnEditorTeste' target='_blank' rel='noopener'>&lt; Abrir HTML Editor /&gt;</a>
    </div>

    <!-- Modal Unificado -->
    <div class='modal-overlay' id='loginModal'>
        <div class='login-card'>
            <span class='close-btn' id='closeLogin'> &amp;times; </span>
            
            <!-- Formulário de Login -->
            <div id='loginSection'>
                <h2>Acessar Conta</h2>
                <form id='loginForm'>
                    <div class='input-group'>
                        <label for='email'>E-mail</label>
                        <input id='email' placeholder='seu@email.com' required='required' type='email'/>
                     </div>
                    <div class='input-group'>
                        <label for='password'>Senha</label>
                        <input id='password' placeholder='Sua senha' required='required' type='password'/>
                    </div>
                    <button class='btn-submit' type='submit'>Entrar</button>
                </form>
                <div class='switch-form'>
                    Não tem uma conta? <a href='#' id='toRegister'>Cadastre-se</a>
                </div>
            </div>

            <!-- Formulário de Cadastro (Escondido por padrão) -->
            <div class='hidden' id='registerSection'>
                <h2>Criar Conta</h2>
                <form id='registerForm'>
                    <div class='input-group'>
                        <label for='regName'>Nome Completo</label>
                        <input id='regName' placeholder='Seu nome' required='required' type='text'/>
                     </div>
                    <div class='input-group'>
                        <label for='regEmail'>E-mail</label>
                        <input id='regEmail' placeholder='seu@email.com' required='required' type='email'/>
                     </div>
                    <div class='input-group'>
                        <label for='regPassword'>Senha</label>
                        <input id='regPassword' placeholder='Crie uma senha' required='required' type='password'/>
                    </div>
                    <button class='btn-submit' type='submit'>Cadastrar</button>
                </form>
                <div class='switch-form'>
                    Já tem uma conta? <a href='#' id='toLogin'>Faça Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Script para alternar telas, persistir sessão e efetuar o redirecionamento -->
    <script type='text/javascript'>
  
        const openLoginBtn = document.getElementById('openLogin');
        const closeLoginBtn = document.getElementById('closeLogin');
        const loginModal = document.getElementById('loginModal');
        
        const loginSection = document.getElementById('loginSection');
        const registerSection = document.getElementById('registerSection');
        
        const toRegister = document.getElementById('toRegister');
        const toLogin = document.getElementById('toLogin');
        
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const homeContent = document.getElementById('homeContent');
        const btnEditorTeste = document.getElementById('btnEditorTeste');

        // URL para onde o botão ou o login redirecionará
        const NOVA_PAGINA_URL = "/p/dashboard.html"; 

        function checkLoginState() {
            const isLoggedIn = localStorage.getItem('userLoggedIn');
            const userEmail = localStorage.getItem('userEmail');
            
            if (isLoggedIn === 'true') {
                openLoginBtn.innerHTML = " &lt; / Sair &gt;";
                if (homeContent) {
                    const userName = userEmail ? userEmail.split('@')[0] : 'Usuário';
                    homeContent.innerHTML = `
                        <h1>Olá, ${userName}!</h1>
                        <p>Você está conectado com sucesso ao sistema.</p>
                    `;
                }
            } else {
                openLoginBtn.innerHTML = " &lt; / Entrar &gt;";
            }
        }

        checkLoginState();

        // Ação do Botão HTML Editor de Teste
        if (btnEditorTeste) {
            btnEditorTeste.addEventListener('click', () => {
                // Redireciona diretamente para a URL desejada
                window.location.href = NOVA_PAGINA_URL;
            });
        }

        openLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (openLoginBtn.innerText.includes("Sair")) {
                localStorage.removeItem('userLoggedIn');
                localStorage.removeItem('userEmail');
                window.location.href = "/"; 
            } else {
                loginModal.classList.add('active');
            }
        });

        closeLoginBtn.addEventListener('click', () => {
            loginModal.classList.remove('active');
        });

        loginModal.addEventListener('click', (e) => {
            if (e.target === loginModal) {
                loginModal.classList.remove('active');
            }
        });

        toRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginSection.classList.add('hidden');
            registerSection.classList.remove('hidden');
        });

        toLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        });

        function handleAuth(email) {
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            loginModal.classList.remove('active');
            window.location.href = NOVA_PAGINA_URL;
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            handleAuth(email);
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            handleAuth(email);
        });
   
    </script>
      
</body>
</html>
